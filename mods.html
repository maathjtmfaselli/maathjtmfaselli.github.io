<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spain Space SWGoH</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/dynamic-loader.js" defer></script>
    <link rel="icon" href="img/swgoh-spain-space-favicon.png" type="image/png">
</head>

<body>

<header id="index-dynamic-header">
    <!-- Si falla la carga, este mensaje será visible -->
    <p>Cargando la cabecera...</p>
</header>

<main>
    <div id="resources-mods"></div>
</main>

<footer id="index-dynamic-footer">
    <!-- Si falla la carga, este mensaje será visible -->
    <p>Cargando el pie...</p>
</footer>
</body>

<script>
    document.addEventListener("DOMContentLoaded", () => {

        const sections = [
            { id: "resources-mods", url: "holocrones/_resources-mods.html" },
        ];

        sections.forEach(sec => {
            fetch(sec.url)
                .then(res => res.text())
                .then(html => {
                    document.getElementById(sec.id).innerHTML = html;
                    initGridPriorityProgress(document.getElementById(sec.id));
                })
                .catch(err => console.error(`Error cargando ${sec.url}`, err));
        });
    });
</script>
</html>
