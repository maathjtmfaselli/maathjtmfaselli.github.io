<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SWGOH Admin</title>
  <style>
    body {
      background: #111827;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      margin-bottom: 24px;
    }

    button {
      padding: 10px 16px;
      margin-right: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: white;
    }

    button:hover {
      background: #1d4ed8;
    }

    .console {
      background: #0f172a;
      border-radius: 8px;
      padding: 16px;
      height: 300px;
      overflow: auto;
      margin-top: 20px;
      font-family: monospace;
      white-space: pre-wrap;
    }

    .success {
      color: #22c55e;
    }

    .error {
      color: #ef4444;
    }

    .info {
      color: #93c5fd;
    }

  </style>
</head>
<body>
<h1>SWGOH Guild Admin</h1>

<button id="fetchGuildRawDataBtn">Fetch Guild Raw Data</button>
<button id="processGuildRawDataBtn">Process Guild Raw Data</button>

<div id="console" class="console"></div>

<script type="module">
  import { SwgohService } from "../services/swgoh.service.js";

  const swgohService = new SwgohService();

  const consoleEl = document.getElementById("console");

  let rawOutput = null;
  let processedOutput = null;

  function log(message, type = "info") {
    const line = document.createElement("div");
    line.className = type;
    line.textContent = `[${type.toUpperCase()}] ${message}`;

    consoleEl.appendChild(line);
    consoleEl.scrollTop = consoleEl.scrollHeight;
  }

  function downloadFile(filename, data) {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();

    URL.revokeObjectURL(url);
  }

  document.getElementById("fetchGuildRawDataBtn").addEventListener("click", async () => {
    log("Fetching Guild Raw data from swgoh", "info");
    const data = await swgohService.fetchGuildRawData();
    downloadFile("guild-members-raw-data.json", data);
    log(`Generated ${data.members.length} players`, "success");
  });

  document.getElementById("processGuildRawDataBtn").addEventListener("click", async () => {
    log("Processing Guild Raw data", "info");
    const data = await swgohService.processGuildRawData();
    downloadFile("guild-members-processed-data.json", data);
    log("Generated processed file", "success");
  });
</script>

</body>
</html>
